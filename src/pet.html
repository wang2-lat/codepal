<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%;
  background: transparent;
  overflow: hidden;
  user-select: none;
  font-family: -apple-system, sans-serif;
}

#container {
  width: 100%; height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
  -webkit-app-region: drag;
}

#pet-svg {
  width: 120px;
  height: 120px;
  transition: transform 0.3s ease;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
}
#pet-svg:hover { transform: scale(1.1); }

#status-bar {
  background: rgba(0,0,0,0.75);
  border-radius: 12px;
  padding: 6px 12px;
  margin-top: 4px;
  color: white;
  font-size: 11px;
  text-align: center;
  backdrop-filter: blur(10px);
  -webkit-app-region: no-drag;
  max-width: 180px;
  opacity: 0.9;
}
#status-bar .name { font-weight: bold; font-size: 12px; }
#status-bar .bars { margin-top: 3px; }
.bar-row { display: flex; align-items: center; gap: 4px; margin: 2px 0; font-size: 9px; }
.bar-track { flex: 1; height: 4px; background: rgba(255,255,255,0.15); border-radius: 2px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 2px; transition: width 0.5s ease; }
.bar-hp .bar-fill { background: #ff6b6b; }
.bar-happy .bar-fill { background: #ffd93d; }
.bar-energy .bar-fill { background: #6bcb77; }
.bar-xp .bar-fill { background: #4d96ff; }
#state-label { font-size: 10px; color: rgba(255,255,255,0.6); margin-top: 2px; }

#menu {
  display: none; position: fixed;
  background: rgba(20,20,30,0.95); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px; padding: 4px; backdrop-filter: blur(20px); z-index: 1000;
  -webkit-app-region: no-drag;
}
#menu .menu-item { padding: 6px 16px; font-size: 12px; color: #ddd; border-radius: 4px; cursor: pointer; }
#menu .menu-item:hover { background: rgba(255,255,255,0.1); color: #fff; }
#menu .sep { height: 1px; background: rgba(255,255,255,0.1); margin: 2px 8px; }

@keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
@keyframes bounce { 0%,100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-15px) scale(1.05); } }
@keyframes shake { 0%,100% { transform: rotate(0); } 25% { transform: rotate(-5deg); } 75% { transform: rotate(5deg); } }
@keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.08); } }
@keyframes wobble { 0%,100% { transform: rotate(0); } 25% { transform: rotate(-3deg); } 75% { transform: rotate(3deg); } }
@keyframes typing { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-2px); } }
@keyframes zzz { 0% { opacity:0; transform: translate(0,0) scale(0.5); } 50% { opacity:1; } 100% { opacity:0; transform: translate(15px,-20px) scale(1.2); } }

.anim-idle { animation: float 3s ease-in-out infinite; }
.anim-thinking { animation: pulse 1s ease-in-out infinite; }
.anim-typing { animation: typing 0.15s ease-in-out infinite; }
.anim-building { animation: shake 0.3s ease-in-out infinite; }
.anim-happy { animation: bounce 0.5s ease-in-out 3; }
.anim-sad { animation: wobble 2s ease-in-out infinite; }
.anim-error { animation: shake 0.15s ease-in-out 5; }
.anim-sleep { animation: float 5s ease-in-out infinite; opacity: 0.7; }
.anim-reading { animation: pulse 2s ease-in-out infinite; }
.anim-working { animation: wobble 1s ease-in-out infinite; }
.anim-juggling { animation: bounce 0.8s ease-in-out infinite; }
.anim-conducting { animation: wobble 0.6s ease-in-out infinite; }
.anim-sweeping { animation: shake 0.5s ease-in-out infinite; }
.anim-alert { animation: bounce 0.3s ease-in-out 5; }
.anim-carrying { animation: wobble 0.8s ease-in-out infinite; }
.anim-wake { animation: bounce 0.6s ease-in-out 2; }

.zzz { position: absolute; top: 20px; right: 20px; font-size: 16px; animation: zzz 2s ease-in-out infinite; color: #6bcb77; }
.zzz:nth-child(2) { animation-delay: 0.5s; font-size: 12px; }
.zzz:nth-child(3) { animation-delay: 1s; font-size: 20px; }

#stats-panel {
  display: none; position: fixed; top: 10px; left: 10px; right: 10px;
  background: rgba(10,10,20,0.95); border: 1px solid rgba(100,200,255,0.2);
  border-radius: 12px; padding: 12px; font-size: 11px; color: #ccc;
  backdrop-filter: blur(20px); z-index: 500; -webkit-app-region: no-drag;
}
#stats-panel h3 { color: #4d96ff; margin-bottom: 8px; font-size: 13px; }
#stats-panel .stat { display: flex; justify-content: space-between; padding: 2px 0; }
#stats-panel .stat-val { color: #6bcb77; font-weight: bold; }
#stats-panel .close-btn { position: absolute; top: 8px; right: 12px; cursor: pointer; color: #666; font-size: 14px; }
#stats-panel .close-btn:hover { color: #fff; }
</style>
</head>
<body>
<div id="container">
  <div id="zzz-container"></div>
  <svg id="pet-svg" viewBox="0 0 120 120" class="anim-idle">
    <ellipse id="body" cx="60" cy="70" rx="35" ry="30" fill="#FFD93D" stroke="#E8A317" stroke-width="2"/>
    <circle id="head" cx="60" cy="38" r="25" fill="#FFD93D" stroke="#E8A317" stroke-width="2"/>
    <polygon id="ear-l" points="40,20 35,2 50,15" fill="#FFD93D" stroke="#E8A317" stroke-width="2"/>
    <polygon id="ear-r" points="80,20 85,2 70,15" fill="#FFD93D" stroke="#E8A317" stroke-width="2"/>
    <polygon points="42,18 38,6 49,16" fill="#FFB5C0"/>
    <polygon points="78,18 82,6 71,16" fill="#FFB5C0"/>
    <g id="eyes">
      <ellipse cx="50" cy="35" rx="4" ry="5" fill="#333"/>
      <ellipse cx="70" cy="35" rx="4" ry="5" fill="#333"/>
      <circle cx="48" cy="33" r="1.5" fill="#fff"/>
      <circle cx="68" cy="33" r="1.5" fill="#fff"/>
    </g>
    <g id="eyes-closed" style="display:none">
      <line x1="46" y1="35" x2="54" y2="35" stroke="#333" stroke-width="2" stroke-linecap="round"/>
      <line x1="66" y1="35" x2="74" y2="35" stroke="#333" stroke-width="2" stroke-linecap="round"/>
    </g>
    <g id="eyes-happy" style="display:none">
      <path d="M46,37 Q50,32 54,37" stroke="#333" stroke-width="2" fill="none" stroke-linecap="round"/>
      <path d="M66,37 Q70,32 74,37" stroke="#333" stroke-width="2" fill="none" stroke-linecap="round"/>
    </g>
    <path id="mouth" d="M54,47 Q60,52 66,47" stroke="#333" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path id="mouth-sad" d="M54,50 Q60,45 66,50" stroke="#333" stroke-width="1.5" fill="none" stroke-linecap="round" style="display:none"/>
    <ellipse cx="42" cy="42" rx="5" ry="3" fill="#FFB5C0" opacity="0.5"/>
    <ellipse cx="78" cy="42" rx="5" ry="3" fill="#FFB5C0" opacity="0.5"/>
    <path d="M90,75 Q105,60 100,45" stroke="#E8A317" stroke-width="3" fill="none" stroke-linecap="round"/>
    <ellipse cx="45" cy="98" rx="10" ry="5" fill="#FFD93D" stroke="#E8A317" stroke-width="1.5"/>
    <ellipse cx="75" cy="98" rx="10" ry="5" fill="#FFD93D" stroke="#E8A317" stroke-width="1.5"/>
    <text id="status-icon" x="90" y="15" font-size="18" text-anchor="middle"></text>
  </svg>
  <div id="status-bar">
    <div class="name"><span id="pet-emoji">🐱</span> <span id="pet-name">Cat</span> <span id="pet-level">Lv.1</span></div>
    <div class="bars">
      <div class="bar-row bar-happy"><span>♥</span><div class="bar-track"><div class="bar-fill" id="fill-happy" style="width:70%"></div></div></div>
      <div class="bar-row bar-energy"><span>⚡</span><div class="bar-track"><div class="bar-fill" id="fill-energy" style="width:80%"></div></div></div>
      <div class="bar-row bar-xp"><span>★</span><div class="bar-track"><div class="bar-fill" id="fill-xp" style="width:0%"></div></div></div>
    </div>
    <div id="state-label">idle</div>
  </div>
</div>
<div id="menu">
  <div class="menu-item" onclick="doFeed()">🍎 Feed</div>
  <div class="menu-item" onclick="doPlay()">🎮 Play</div>
  <div class="menu-item" onclick="doTrain()">💪 Train</div>
  <div class="sep"></div>
  <div class="menu-item" onclick="showStats()">📊 Stats</div>
</div>
<div id="stats-panel">
  <span class="close-btn" onclick="hideStats()">✕</span>
  <h3>📊 Stats</h3>
  <div id="stats-content"></div>
</div>
<script>
const { ipcRenderer } = require('electron');
const petSvg = document.getElementById('pet-svg');
const stateLabel = document.getElementById('state-label');
const statusIcon = document.getElementById('status-icon');
const menu = document.getElementById('menu');
const zzzContainer = document.getElementById('zzz-container');

const STATE_LABELS = {
  idle:'💤 chilling...', sleep:'😴 sleeping...', wake:'👋 waking up!',
  thinking:'🤔 thinking...', reading:'📖 reading...', typing:'⌨️ writing code...',
  building:'🔨 building...', working:'⚙️ working...', happy:'🎉 task done!',
  sad:'😞 something failed...', error:'❌ error!', juggling:'🤹 subagent running',
  conducting:'🎼 multi-agent!', sweeping:'🧹 compacting...', alert:'🔔 notification!',
  carrying:'📦 new worktree',
};
const STATE_ICONS = {
  thinking:'💭', reading:'📖', typing:'⌨️', building:'🔨', happy:'✨', sad:'💧',
  error:'💥', juggling:'🎪', conducting:'🎼', sweeping:'🧹', alert:'❗',
  carrying:'📦', working:'⚙️', sleep:'💤', wake:'☀️', idle:'',
};
let currentState = 'idle';

function updatePetAppearance(state) {
  petSvg.className = '';
  petSvg.classList.add('anim-' + state);
  currentState = state;
  document.getElementById('eyes').style.display = ['sleep','happy'].includes(state) ? 'none' : '';
  document.getElementById('eyes-closed').style.display = state === 'sleep' ? '' : 'none';
  document.getElementById('eyes-happy').style.display = state === 'happy' ? '' : 'none';
  document.getElementById('mouth').style.display = ['sad','error'].includes(state) ? 'none' : '';
  document.getElementById('mouth-sad').style.display = ['sad','error'].includes(state) ? '' : 'none';
  statusIcon.textContent = STATE_ICONS[state] || '';
  stateLabel.textContent = STATE_LABELS[state] || state;
  // ZZZ
  while (zzzContainer.firstChild) zzzContainer.removeChild(zzzContainer.firstChild);
  if (state === 'sleep') {
    for (const txt of ['z','Z','z']) {
      const s = document.createElement('span');
      s.className = 'zzz';
      s.textContent = txt;
      zzzContainer.appendChild(s);
    }
  }
  // Color
  const bodyEl = document.getElementById('body');
  const headEl = document.getElementById('head');
  if (state === 'happy') { bodyEl.style.fill = '#6BCB77'; headEl.style.fill = '#6BCB77'; }
  else if (state === 'sad' || state === 'error') { bodyEl.style.fill = '#A8A8A8'; headEl.style.fill = '#A8A8A8'; }
  else { bodyEl.style.fill = '#FFD93D'; headEl.style.fill = '#FFD93D'; }
}

function updateBars(state) {
  if (!state) return;
  document.getElementById('fill-happy').style.width = state.happiness + '%';
  document.getElementById('fill-energy').style.width = state.energy + '%';
  document.getElementById('fill-xp').style.width = (state.xp / Math.max(1, state.xpNext) * 100) + '%';
  document.getElementById('pet-name').textContent = state.nickname || state.speciesName;
  document.getElementById('pet-level').textContent = 'Lv.' + state.level;
  document.getElementById('pet-emoji').textContent = state.speciesEmoji;
}

ipcRenderer.on('agent-event', (_, event) => {
  const map = { SessionStart:'wake', SessionEnd:'sleep', UserPromptSubmit:'thinking',
    PreToolUse:'typing', Stop:'happy', StopFailure:'sad', SubagentStart:'juggling',
    PreCompact:'sweeping' };
  updatePetAppearance(map[event.type] || 'working');
});
ipcRenderer.on('state-update', (_, state) => {
  if (state) { updateBars(state); if (state.agentState) updatePetAppearance(state.agentState); }
});
ipcRenderer.on('show-stats', () => showStats());

document.addEventListener('contextmenu', (e) => {
  e.preventDefault();
  menu.style.display = 'block';
  menu.style.left = Math.min(e.clientX, window.innerWidth - 150) + 'px';
  menu.style.top = Math.min(e.clientY, window.innerHeight - 150) + 'px';
});
document.addEventListener('click', () => { menu.style.display = 'none'; });

async function doFeed() {
  const r = await ipcRenderer.invoke('feed');
  stateLabel.textContent = r.message; updatePetAppearance('happy');
  updateBars(await ipcRenderer.invoke('get-state'));
}
async function doPlay() {
  const r = await ipcRenderer.invoke('play');
  stateLabel.textContent = r.message; updatePetAppearance('happy');
  updateBars(await ipcRenderer.invoke('get-state'));
}
async function doTrain() {
  const r = await ipcRenderer.invoke('train');
  stateLabel.textContent = r.message; updatePetAppearance('building');
  updateBars(await ipcRenderer.invoke('get-state'));
}

async function showStats() {
  const s = await ipcRenderer.invoke('get-stats');
  const p = document.getElementById('stats-panel');
  const c = document.getElementById('stats-content');
  while (c.firstChild) c.removeChild(c.firstChild);
  const items = [
    ['Level', s.level], ['XP', s.xp+'/'+s.xpNext], ['Sessions', s.totalSessions],
    ['Completions', s.totalCompletions], ['Errors', s.totalErrors],
    ['Tool Uses', s.totalToolUses], ['Subagents', s.totalSubagents],
    ['Longest Session', s.longestSession+'m'], ['Streak', s.streakDays+'d 🔥'],
    ['Achievements', s.achievements+'/'+s.totalAchievements+' 🏆'],
  ];
  for (const [label, val] of items) {
    const row = document.createElement('div'); row.className = 'stat';
    const l = document.createElement('span'); l.textContent = label;
    const v = document.createElement('span'); v.className = 'stat-val'; v.textContent = val;
    row.appendChild(l); row.appendChild(v); c.appendChild(row);
  }
  p.style.display = 'block';
}
function hideStats() { document.getElementById('stats-panel').style.display = 'none'; }

(async () => {
  const state = await ipcRenderer.invoke('get-state');
  updateBars(state); updatePetAppearance(state.agentState || 'idle');
})();
setInterval(() => {
  if (currentState !== 'sleep' && currentState !== 'happy') {
    const eyes = document.getElementById('eyes');
    const closed = document.getElementById('eyes-closed');
    eyes.style.display = 'none'; closed.style.display = '';
    setTimeout(() => {
      if (currentState !== 'sleep' && currentState !== 'happy') {
        eyes.style.display = ''; closed.style.display = 'none';
      }
    }, 150);
  }
}, 4000);
</script>
</body>
</html>
